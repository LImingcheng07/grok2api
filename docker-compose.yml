name: grok2api

services:
  grok2api:
    container_name: grok2api
    image: "${GROK2API_IMAGE:-ghcr.io/chenyme/grok2api:latest}"
    ports:
      - "${GROK2API_PORT:-8000}:8000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - "${GROK2API_CONFIG:-./config.yaml}:/run/grok2api/config.yaml:ro"
      - grok2api-data:/app/data
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    depends_on:
      auto-register:
        condition: service_healthy

  # 协议自动补号 sidecar（Cloud Temp Mail + ez-captcha）
  # 在管理端「设置 → 自动补号」开启；Sidecar 地址填 http://auto-register:8091
  # 随机 IP：在「设置 → 出口代理」添加多个 Grok Web 节点，每号随机轮训
  auto-register:
    container_name: grok2api-auto-register
    build:
      context: ./services/auto_register
    ports:
      - "${AUTO_REGISTER_PORT:-8091}:8091"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      AUTO_REGISTER_PORT: "8091"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  # 如果出口 IP 不干净，可取消以下注释使用 WARP 作为落地代理。
  # 启用后，在管理端“设置 -> 出口代理”中新增 socks5://warp:1080。
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

volumes:
  grok2api-data:
